name: CLV auto-sync

# Self-updating Tracker: grade finished tickets + snapshot new +EV picks on a schedule, then commit
# reports/clv_open.csv + reports/clv_ledger.csv. The push redeploys the live Streamlit app, so the
# Tracker settles bets with no manual step. (Runs in GitHub's infra — the cloud app can't self-persist.)

on:
  schedule:
    - cron: "0 */2 * * *"      # every 2 hours (UTC); GitHub may delay under load
  workflow_dispatch: {}         # manual "Run workflow" button too

permissions:
  contents: write               # allow the bot to commit the updated ledger

concurrency:
  group: clv-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Grade + snapshot
        env:                      # optional — degrade gracefully if a secret isn't set
          THESTATSAPI_KEY: ${{ secrets.THESTATSAPI_KEY }}
          ACTIONNETWORK_FEED_URL: ${{ secrets.ACTIONNETWORK_FEED_URL }}
        run: python scripts/snapshot_odds.py

      - name: Commit updated tracker
        run: |
          git config user.name "clv-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/clv_open.csv reports/clv_ledger.csv
          if git diff --cached --quiet; then
            echo "no tracker changes this run"; exit 0
          fi
          git commit -m "CLV auto-sync: grade finished + snapshot new picks"
          git pull --rebase --autostash origin main || true
          git push origin HEAD:main
