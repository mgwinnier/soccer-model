# Streamlit configuration — modern graphite theme (matches app/theme.py).
[theme]
base = "dark"
primaryColor = "#34d39a"            # emerald accent
backgroundColor = "#0b0c0e"         # graphite base
secondaryBackgroundColor = "#15171c"  # card surface
textColor = "#e8eaed"
font = "sans serif"

[server]
# Streamlit Community Cloud manages the server; these are safe defaults.
enableXsrfProtection = true
enableCORS = false
